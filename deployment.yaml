# Example Agent VS — Helm chart values
#
# Uses hologram-generic-ai-agent-chart which bundles:
#   - Chatbot (with agent pack, LLM, RAG, MCP)
#   - VS Agent (DIDComm, wallet)
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# Deployment target: eafit.testnet.verana.network
chartSource: oci://registry-1.docker.io/io2060/hologram-generic-ai-agent-chart
chartVersion: v1.12.0

global:
  domain: eafit.testnet.verana.network

nameOverride: 'mariaprojas-agent-chart'

# Credential definition ID for user authentication (injected from config.env by workflow)
credentialDefinitionId: ''

# === Redis ===
redis:
  enabled: true
  port: 6379
  image:
    pullPolicy: Always
  persistence:
    enabled: true
    mountPath: /data
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  service:
    type: ClusterIP

# === PostgreSQL ===
postgres:
  enabled: true
  port: 5432
  image:
    pullPolicy: Always
  env:
    - name: PGDATA
      value: '/var/lib/postgresql/data/pgdata'
  secret:
    POSTGRES_PASSWORD: ''
    POSTGRES_USER: 'example_agent_db'
    POSTGRES_DB: 'example-agent'
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  storage:
    size: 2Gi
    storageClassName: csi-cinder-high-speed
  service:
    type: ClusterIP

# === Chatbot ===
chatbot:
  replicas: 1
  image:
    repository: ghcr.io/mariaprojas/eafit-challenge-agent-example/hologram-agent
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: '200m'
      memory: '256Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  env:
    - name: APP_PORT
      value: '3003'
    - name: LOG_LEVEL
      value: 'info'
    - name: LLM_PROVIDER
      value: 'anthropic'
    - name: ANTHROPIC_MODEL
      value: 'claude-haiku-4-5-20251001'
    - name: OPENAI_BASE_URL
      value: 'https://api.voyageai.com/v1'
    - name: OPENAI_EMBEDDINGS_MODEL
      value: 'voyage-4-lite'
    - name: VECTOR_STORE
      value: 'redis'
    - name: VECTOR_INDEX_NAME
      value: 'example_agent'
    - name: RAG_PROVIDER
      value: 'langchain'
    - name: RAG_DOCS_PATH
      value: '/app/rag/docs'
    - name: AGENT_MEMORY_BACKEND
      value: 'postgres'
    - name: AGENT_MEMORY_WINDOW
      value: '20'
    - name: REDIS_URL
      value: 'redis://mariaprojas-agent-chart-redis:6379'
    - name: VS_AGENT_ADMIN_URL
      value: 'http://mariaprojas-agent.{{ .Release.Namespace }}:3000'
    - name: POSTGRES_HOST
      value: 'mariaprojas-agent-chart-postgres.{{ .Release.Namespace }}'
    - name: CREDENTIAL_DEFINITION_ID
      value: '{{ .Values.credentialDefinitionId | default "" }}'
    - name: RAG_ENABLED
      value: 'false'
      
  agentPack:
    enabled: true
    name: example-agent
    mountPath: /app/agent-packs/example-agent
    fileName: agent-pack.yaml
    existingConfigMap: 'example-agent-agent-pack'
  secret:
    POSTGRES_PASSWORD: ''
    POSTGRES_USER: 'example_agent_db'
    POSTGRES_DB_NAME: 'example-agent'
  service:
    type: ClusterIP
    port: 3003
  storage:
    size: 1Gi
    storageClassName: csi-cinder-high-speed
  ingress:
    enabled: false

# === Stats (disabled) ===
stats:
  enabled: false

# === Artemis (disabled) ===
artemis:
  enabled: false

# === VS Agent ===
vs-agent-chart:
  enabled: true
  name: mariaprojas-agent
  didcommLabel: 'Asistente de Pre-Auditoría Colombia'
  didcommInvitationImageUrl: 'https://hologram.zone/images/verana.svg'
  eventsBaseUrl: http://mariaprojas-agent-chart-chatbot:3003
  ingress:
    host: "mariaprojas-agent.team-c.teams.eafit.testnet.verana.network"
    tlsSecret: "mariaprojas-agent.team-c.teams.eafit.testnet.verana.network-tls"
    public:
      enableCors: true
    private:
      whitelistSourceRange: ""
      host: ""
  extraEnv:
    - name: AGENT_WALLET_ID
      value: "mariaprojas-wallet"
    - name: USE_CORS
      value: "true"
    - name: REDIS_HOST
      value: "mariaprojas-agent"
    - name: AGENT_LOG_LEVEL
      value: "info"
    - name: SELF_ISSUED_VTC_ORG_TYPE
      value: "PRIVATE"
    - name: SELF_ISSUED_VTC_ORG_COUNTRYCODE
      value: "CO"
    - name: SELF_ISSUED_VTC_ORG_ADDRESS
      value: "Medellin, Colombia"
    - name: SELF_ISSUED_VTC_SERVICE_TYPE
      value: "AIAgent"
    - name: SELF_ISSUED_VTC_SERVICE_DESCRIPTION
      value: "Asistente de pre-auditoría en Colombia especializado en NIAs y cumplimiento normativo."
    - name: SELF_ISSUED_VTC_SERVICE_MINIMUMAGEREQUIRED
      value: "0"
