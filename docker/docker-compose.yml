# =============================================================================
# Example Agent VS — Local Docker Compose
# =============================================================================
#
# Runs the Example Agent support services locally:
#   - Chatbot (hologram-generic-ai-agent)
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# The VS Agent is started separately by scripts/setup.sh (standalone container).
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - VS Agent running (via scripts/setup.sh)
#   - OPENAI_API_KEY set in environment
#
# Usage:
#   set -a && source config.env && set +a
#   export OPENAI_API_KEY=sk-...
#   docker compose -f docker/docker-compose.yml up
#
# =============================================================================

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-example-agent}
      - POSTGRES_USER=${POSTGRES_USER:-example_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "${CHATBOT_PORT:-3003}:${CHATBOT_PORT:-3003}"
    environment:
      - APP_PORT=${CHATBOT_PORT:-3003}
      - AGENT_PACK_PATH=/app/agent-packs/example-agent
      - LOG_LEVEL=3
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VECTOR_STORE=redis
      - VECTOR_INDEX_NAME=example_agent
      - RAG_PROVIDER=langchain
      - RAG_DOCS_PATH=/app/rag/docs
      - AGENT_MEMORY_BACKEND=redis
      - AGENT_MEMORY_WINDOW=20
      - REDIS_URL=redis://redis:6379
      - VS_AGENT_ADMIN_URL=http://host.docker.internal:${VS_AGENT_ADMIN_PORT:-3010}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-example_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB_NAME=${POSTGRES_DB:-example-agent}
      - CREDENTIAL_DEFINITION_ID=${CREDENTIAL_DEFINITION_ID}
      - GITHUB_MCP_URL=${GITHUB_MCP_URL:-https://api.githubcopilot.com/mcp/}
      - MCP_CONFIG_ENCRYPTION_KEY=${MCP_CONFIG_ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.voyageai.com/v1}
      - OPENAI_EMBEDDINGS_MODEL=${OPENAI_EMBEDDINGS_MODEL:-voyage-multilingual-2}
    volumes:
      - chatbot-data:/app/data
      - ../agent-pack.yaml:/app/agent-packs/example-agent/agent-pack.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres

volumes:
  redis-data:
  postgres-data:
  chatbot-data:
